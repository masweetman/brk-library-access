[credentials]
library_card_number = YOUR_LIBRARY_CARD_NUMBER
last_name = YOUR_LAST_NAME

[nyt]
nyt_email = YOUR_EMAIL
nyt_password = YOUR_PASSWORD

[washingtonpost]
wp_email = YOUR_EMAIL
wp_password = YOUR_PASSWORD

[wsj]
wsj_email = YOUR_EMAIL
wsj_password = YOUR_PASSWORD

[browser]
# Path to store persistent browser session/cookies (avoids repeated logins)
user_data_dir = YOUR_PATH_TO_BROWSER_PROFILE
# Set to false to watch the browser in action (useful for debugging)
headless = false
# How long to wait for elements/navigation, in milliseconds (raised for heavy JS sites)
timeout = 15000
# Human-like delay range in milliseconds between actions
delay_min_ms = 300
delay_max_ms = 900
# Slows all browser interactions by this many ms — helps avoid bot detection
slow_mo_ms = 100